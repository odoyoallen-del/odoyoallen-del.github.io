<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allen Odoyo - Developer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .card {
            background: white;
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        
        h1 {
            font-size: 2.5rem;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        
        .tagline {
            color: #667eea;
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 20px;
        }
        
        p {
            color: #555;
            line-height: 1.6;
            margin-bottom: 16px;
        }
        
        .contact {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }
        
        .contact a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .contact a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 600px) {
            .card { padding: 40px 25px; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Allen Odoyo</h1>
        <div class="tagline">Software Developer</div>
        <p>Based in Nairobi, Kenya</p>
        <p>Building things for the web.</p>
        <div class="contact">
            <p><a href="mailto:odoyoallen@gmail.com">odoyoallen@gmail.com</a></p>
        </div>
    </div>
</body>
</html>
